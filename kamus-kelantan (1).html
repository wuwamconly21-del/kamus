<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamus Kelantan</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f0e8; color: #1a1a1a; }

  /* NAV */
  .nav { background: #6B0F0F; padding: 0 1.5rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
  .nav-logo { color: #fff; font-size: 17px; font-weight: 600; letter-spacing: 0.5px; }
  .nav-links { display: flex; gap: 6px; }
  .nav-links button { background: none; border: none; color: rgba(255,255,255,0.75); font-size: 13px; padding: 6px 12px; border-radius: 20px; cursor: pointer; transition: all 0.15s; }
  .nav-links button:hover, .nav-links button.active { background: rgba(255,255,255,0.15); color: #fff; }
  .admin-btn { background: #B8860B !important; color: #fff !important; }

  /* HERO */
  .hero { background: #8B1A1A; padding: 2.5rem 1.5rem; text-align: center; position: relative; overflow: hidden; }
  .hero::after { content: ''; position: absolute; inset: 0; background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"); }
  .hero-inner { position: relative; }
  .hero h1 { font-size: 28px; color: #fff; font-weight: 700; }
  .hero p { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 4px; }
  .hero-jawi { font-size: 20px; color: rgba(255,255,255,0.45); margin-top: 8px; direction: rtl; }

  /* WOTD */
  .wotd-bar { background: #B8860B; padding: 1rem 1.5rem; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .wotd-label { background: rgba(255,255,255,0.2); color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 20px; white-space: nowrap; font-weight: 600; letter-spacing: 0.5px; }
  .wotd-word { font-size: 20px; font-weight: 700; color: #fff; }
  .wotd-jawi { font-size: 16px; color: rgba(255,255,255,0.6); direction: rtl; }
  .wotd-meaning { font-size: 13px; color: rgba(255,255,255,0.85); }

  /* MAIN */
  .main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border-radius: 10px; padding: 1rem; text-align: center; border: 1px solid #e8e0d0; }
  .stat-num { font-size: 26px; font-weight: 700; color: #8B1A1A; }
  .stat-label { font-size: 12px; color: #888; margin-top: 2px; }

  /* SEARCH & FILTER */
  .toolbar { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; border: 1px solid #e8e0d0; }
  .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .search-row input { flex: 1; padding: 9px 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #faf8f4; }
  .search-row input:focus { outline: none; border-color: #8B1A1A; }
  .cats { display: flex; gap: 6px; flex-wrap: wrap; }
  .cat-btn { padding: 5px 14px; border-radius: 20px; border: 1px solid #ddd; background: #faf8f4; font-size: 13px; cursor: pointer; transition: all 0.15s; color: #555; }
  .cat-btn.active { background: #8B1A1A; color: #fff; border-color: #8B1A1A; }

  /* WORD GRID */
  .words-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .word-card { background: #fff; border-radius: 12px; padding: 1rem 1.25rem; border: 1px solid #e8e0d0; cursor: pointer; transition: all 0.15s; position: relative; }
  .word-card:hover { border-color: #8B1A1A; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(139,26,26,0.08); }
  .wc-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .wc-word { font-size: 18px; font-weight: 700; color: #1a1a1a; }
  .wc-jawi { font-size: 14px; color: #aaa; direction: rtl; margin-top: 2px; }
  .wc-cat { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; margin-top: 6px; font-weight: 600; letter-spacing: 0.3px; }
  .cat-umum { background: #E6F1FB; color: #185FA5; }
  .cat-warisan { background: #FAEEDA; color: #854F0B; }
  .cat-kesenian { background: #FBEAF0; color: #993556; }
  .cat-sifat { background: #EAF3DE; color: #3B6D11; }
  .wc-meaning { font-size: 13px; color: #555; margin-top: 8px; line-height: 1.5; }
  .wc-example { font-size: 12px; color: #aaa; margin-top: 4px; font-style: italic; }
  .speak-btn { background: none; border: 1px solid #ddd; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #888; flex-shrink: 0; transition: all 0.15s; font-size: 14px; }
  .speak-btn:hover { border-color: #8B1A1A; color: #8B1A1A; }
  .speak-btn.playing { background: #8B1A1A; border-color: #8B1A1A; color: #fff; }
  .del-btn { position: absolute; top: 8px; right: 44px; background: none; border: none; color: #ddd; cursor: pointer; font-size: 16px; display: none; transition: color 0.15s; }
  .word-card:hover .del-btn { display: block; }
  .del-btn:hover { color: #e24b4a; }

  /* AI SECTION */
  .ai-box { background: #fff; border-radius: 12px; padding: 1.25rem; margin-bottom: 2rem; border: 1px solid #e8e0d0; }
  .ai-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: #1a1a1a; margin-bottom: 1rem; }
  .ai-dot { width: 8px; height: 8px; border-radius: 50%; background: #8B1A1A; }
  .ai-row { display: flex; gap: 8px; }
  .ai-row input { flex: 1; padding: 9px 14px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #faf8f4; }
  .ai-row input:focus { outline: none; border-color: #8B1A1A; }
  .ai-go { padding: 9px 18px; background: #8B1A1A; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .ai-go:hover { background: #6B0F0F; }
  .ai-loading { display: none; align-items: center; gap: 8px; margin-top: 12px; font-size: 13px; color: #888; }
  .ai-loading.show { display: flex; }
  .dots span { animation: blink 1.2s infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
  .ai-result { display: none; margin-top: 12px; padding: 1rem; background: #faf8f4; border-radius: 8px; border: 1px solid #e8e0d0; font-size: 14px; line-height: 1.7; }
  .ai-result.show { display: block; }

  /* ADMIN PANEL */
  .admin-panel { display: none; background: #fff; border-radius: 12px; padding: 1.5rem; margin-bottom: 2rem; border: 2px solid #B8860B; }
  .admin-panel.show { display: block; }
  .admin-title { font-size: 16px; font-weight: 700; color: #B8860B; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 8px; }
  .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-group label { font-size: 12px; color: #888; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .field-group input, .field-group select, .field-group textarea { padding: 9px 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 14px; background: #faf8f4; font-family: inherit; }
  .field-group input:focus, .field-group select:focus, .field-group textarea:focus { outline: none; border-color: #B8860B; }
  .field-group textarea { resize: vertical; min-height: 60px; }
  .admin-actions { display: flex; gap: 8px; margin-top: 4px; }
  .add-btn { padding: 10px 20px; background: #8B1A1A; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .add-btn:hover { background: #6B0F0F; }
  .clear-btn { padding: 10px 16px; background: none; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; cursor: pointer; color: #888; }
  .clear-btn:hover { border-color: #e24b4a; color: #e24b4a; }
  .export-btn { padding: 10px 16px; background: #B8860B; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .export-btn:hover { background: #9a6f09; }
  .import-btn { padding: 10px 16px; background: none; border: 1px solid #B8860B; border-radius: 8px; font-size: 14px; cursor: pointer; color: #B8860B; font-weight: 600; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #aaa; grid-column: 1/-1; }
  .empty-state div { font-size: 40px; margin-bottom: 8px; }
  @media (max-width: 600px) {
    .admin-grid { grid-template-columns: 1fr; }
    .nav-links button { font-size: 11px; padding: 5px 8px; }
    .words-grid { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">📖 Kamus Kelantan</div>
  <div class="nav-links">
    <button class="active" onclick="showSection('kamus')">Kamus</button>
    <button onclick="showSection('ai')">Tanya AI</button>
    <button class="admin-btn" onclick="toggleAdmin()">+ Tambah Kata</button>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>Kamus Kelantan</h1>
    <p>Warisan Bahasa, Jiwa Bangsa</p>
    <div class="hero-jawi">واريسن بهاس، جيوا بڠسا</div>
  </div>
</div>

<div class="wotd-bar">
  <span class="wotd-label">✨ PERKATAAN HARI INI</span>
  <span class="wotd-word" id="wotd-word">—</span>
  <span class="wotd-jawi" id="wotd-jawi"></span>
  <span class="wotd-meaning" id="wotd-meaning"></span>
</div>

<div class="main">

  <div class="stats">
    <div class="stat"><div class="stat-num" id="stat-total">0</div><div class="stat-label">Jumlah Kata</div></div>
    <div class="stat"><div class="stat-num" id="stat-found">0</div><div class="stat-label">Dijumpai</div></div>
    <div class="stat"><div class="stat-num">4</div><div class="stat-label">Kategori</div></div>
  </div>

  <!-- ADMIN PANEL -->
  <div class="admin-panel" id="admin-panel">
    <div class="admin-title">🛠️ Panel Pentadbir — Tambah Perkataan Baru</div>
    <div class="admin-grid">
      <div class="field-group">
        <label>Perkataan Kelantan *</label>
        <input type="text" id="f-word" placeholder="cth: Bekwoh" />
      </div>
      <div class="field-group">
        <label>Tulisan Jawi</label>
        <input type="text" id="f-jawi" placeholder="cth: بيکوه" dir="rtl" />
      </div>
      <div class="field-group">
        <label>Kategori *</label>
        <select id="f-cat">
          <option value="umum">Umum</option>
          <option value="warisan">Warisan</option>
          <option value="kesenian">Kesenian</option>
          <option value="sifat">Sifat & Emosi</option>
        </select>
      </div>
      <div class="field-group">
        <label>Makna (BM Standard) *</label>
        <input type="text" id="f-meaning" placeholder="cth: Majlis kenduri beramai-ramai" />
      </div>
      <div class="field-group" style="grid-column: 1/-1;">
        <label>Contoh Ayat (Kelantan)</label>
        <textarea id="f-example" placeholder="cth: Jom gi bekwoh rumoh dio malam ni."></textarea>
      </div>
    </div>
    <div class="admin-actions">
      <button class="add-btn" onclick="addWord()">+ Tambah Perkataan</button>
      <button class="clear-btn" onclick="clearForm()">Kosongkan</button>
      <button class="export-btn" onclick="exportData()">⬇ Export JSON</button>
      <label class="import-btn" style="display:inline-block; cursor:pointer;">⬆ Import JSON<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    </div>
  </div>

  <!-- AI BOX -->
  <div class="ai-box" id="ai-section">
    <div class="ai-title"><div class="ai-dot"></div> Tanya AI — Makna & Contoh Ayat Kelantan</div>
    <div class="ai-row">
      <input type="text" id="ai-input" placeholder="Taip perkataan Kelantan (cth: Lorak, Bekwoh, Guane)..." />
      <button class="ai-go" onclick="askAI()">Tanya →</button>
    </div>
    <div class="ai-loading" id="ai-loading"><div class="dots"><span>●</span><span>●</span><span>●</span></div><span>Mencari makna...</span></div>
    <div class="ai-result" id="ai-result"></div>
  </div>

  <div class="toolbar">
    <div class="search-row">
      <input type="text" id="search" placeholder="🔍  Cari perkataan atau makna..." oninput="renderWords()" />
    </div>
    <div class="cats">
      <button class="cat-btn active" onclick="setCat('semua',this)">Semua</button>
      <button class="cat-btn" onclick="setCat('umum',this)">Umum</button>
      <button class="cat-btn" onclick="setCat('warisan',this)">Warisan</button>
      <button class="cat-btn" onclick="setCat('kesenian',this)">Kesenian</button>
      <button class="cat-btn" onclick="setCat('sifat',this)">Sifat</button>
    </div>
  </div>

  <div class="words-grid" id="words-grid"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const DEFAULT_WORDS = [
  {w:"Bekwoh",j:"بيکوه",cat:"warisan",m:"Majlis kenduri atau perjumpaan beramai-ramai",ex:"Jom gi bekwoh rumoh dio malam ni."},
  {w:"Lorak",j:"لوراك",cat:"umum",m:"Hanyut atau tersasar dari tempat asal",ex:"Bola tu lorak jauh dari padang."},
  {w:"Demo",j:"ديمو",cat:"umum",m:"Mereka atau awak (ganti nama)",ex:"Demo doh makan ke belum?"},
  {w:"Ghoyak",j:"غوياك",cat:"umum",m:"Cakap atau beritahu",ex:"Dio ghoyak kat aku tadi."},
  {w:"Kecek",j:"کيچيق",cat:"umum",m:"Bercakap atau berbual",ex:"Jom kecek sat, lama dok jumpo."},
  {w:"Mung",j:"موڠ",cat:"umum",m:"Kamu atau awak (informal)",ex:"Mung pergi mana tadi?"},
  {w:"Tok soh",j:"توك سوه",cat:"umum",m:"Tidak perlu atau tak payah",ex:"Tok soh susah-susah, aku boleh tolong."},
  {w:"Acu",j:"ايچو",cat:"sifat",m:"Cuba atau jom (ajakan)",ex:"Acu kito tengok wayang malam ni."},
  {w:"Guane",j:"ڬوانيي",cat:"umum",m:"Macam mana atau bagaimana",ex:"Guane cerita, doh settle ke?"},
  {w:"Ngehung",j:"ڠيهوڠ",cat:"sifat",m:"Malas atau tidak bersemangat",ex:"Budak tu ngehung betul hari ni."},
  {w:"Wayang",j:"واياڠ",cat:"kesenian",m:"Wayang kulit — seni tradisi Kelantan",ex:"Malam ni ada wayang kat padang."},
  {w:"Dikir Barat",j:"ديکير بارت",cat:"kesenian",m:"Seni persembahan beramai-ramai khas Kelantan",ex:"Pasukan kito menang dikir barat tahun ni."},
  {w:"Songket",j:"سوڠکيت",cat:"warisan",m:"Kain tenunan tradisi berbenang emas Kelantan",ex:"Mak pakai baju songket cantik sangat."},
  {w:"Wau",j:"واءو",cat:"warisan",m:"Layang-layang tradisi Kelantan yang besar",ex:"Musim angin best terbang wau kat pantai."},
  {w:"Gasing",j:"ڬاسيڠ",cat:"warisan",m:"Permainan tradisi gasing besar Kelantan",ex:"Budak-budak dulu suka main gasing."},
  {w:"Lebiu",j:"لبيو",cat:"sifat",m:"Lebih baik atau elok",ex:"Lebiu kito balik awal hari ni."},
  {w:"Sepak Raga",j:"سيڤق راڬ",cat:"kesenian",m:"Permainan tradisi menendang bola rotan",ex:"Doh lama tak tengok orang main sepak raga."},
  {w:"Batik",j:"باتيق",cat:"warisan",m:"Kain corak tradisi Malaysia",ex:"Baju batik dia cantik, beli mana?"},
  {w:"Main Puteri",j:"ماءين ڤوتري",cat:"kesenian",m:"Ritual penyembuhan tradisional Kelantan",ex:"Pak long buat main puteri untuk ubat."},
  {w:"Saya",j:"ساي",cat:"umum",m:"Aku (cara Kelantan)",ex:"Saya ni orang Kota Bharu."}
];

let words = [];
let currentCat = 'semua';
let adminVisible = false;

function loadWords() {
  try {
    const saved = localStorage.getItem('kk_words');
    words = saved ? JSON.parse(saved) : [...DEFAULT_WORDS];
  } catch(e) {
    words = [...DEFAULT_WORDS];
  }
}

function saveWords() {
  localStorage.setItem('kk_words', JSON.stringify(words));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function toggleAdmin() {
  adminVisible = !adminVisible;
  document.getElementById('admin-panel').classList.toggle('show', adminVisible);
  if (adminVisible) document.getElementById('admin-panel').scrollIntoView({behavior:'smooth',block:'start'});
}

function showSection(s) {
  document.querySelectorAll('.nav-links button:not(.admin-btn)').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function setCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderWords();
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let list = currentCat === 'semua' ? words : words.filter(w => w.cat === currentCat);
  if (q) list = list.filter(w => w.w.toLowerCase().includes(q) || w.m.toLowerCase().includes(q) || (w.ex||'').toLowerCase().includes(q));
  return list;
}

function renderWords() {
  const list = getFiltered();
  document.getElementById('stat-total').textContent = words.length;
  document.getElementById('stat-found').textContent = list.length;
  const grid = document.getElementById('words-grid');

  if (!list.length) {
    grid.innerHTML = '<div class="empty-state"><div>🔍</div><p>Tiada perkataan dijumpai.<br>Cuba cari yang lain atau tambah perkataan baru!</p></div>';
    return;
  }

  grid.innerHTML = list.map((w, i) => {
    const realIdx = words.indexOf(w);
    return `
    <div class="word-card">
      <button class="del-btn" onclick="deleteWord(${realIdx})" title="Padam">✕</button>
      <div class="wc-top">
        <div>
          <div class="wc-word">${w.w}</div>
          ${w.j ? `<div class="wc-jawi">${w.j}</div>` : ''}
        </div>
        <button class="speak-btn" id="spk-${realIdx}" onclick="speakWord('${w.w.replace(/'/g,"\\'")}',${realIdx})" title="Sebut">▶</button>
      </div>
      <span class="wc-cat cat-${w.cat}">${w.cat}</span>
      <div class="wc-meaning">${w.m}</div>
      ${w.ex ? `<div class="wc-example">"${w.ex}"</div>` : ''}
    </div>`;
  }).join('');
}

function speakWord(word, idx) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'ms-MY';
  utt.rate = 0.82;
  const btn = document.getElementById('spk-' + idx);
  if (btn) {
    btn.classList.add('playing');
    utt.onend = () => { if(btn) btn.classList.remove('playing'); };
    utt.onerror = () => { if(btn) btn.classList.remove('playing'); };
  }
  window.speechSynthesis.speak(utt);
}

function addWord() {
  const word = document.getElementById('f-word').value.trim();
  const meaning = document.getElementById('f-meaning').value.trim();
  if (!word || !meaning) { showToast('⚠️ Perkataan dan makna wajib diisi!'); return; }
  const newWord = {
    w: word,
    j: document.getElementById('f-jawi').value.trim(),
    cat: document.getElementById('f-cat').value,
    m: meaning,
    ex: document.getElementById('f-example').value.trim()
  };
  words.unshift(newWord);
  saveWords();
  renderWords();
  clearForm();
  showToast('✅ Perkataan "' + word + '" berjaya ditambah!');
}

function clearForm() {
  ['f-word','f-jawi','f-meaning','f-example'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-cat').value = 'umum';
}

function deleteWord(idx) {
  if (!confirm('Padam "' + words[idx].w + '"?')) return;
  const name = words[idx].w;
  words.splice(idx, 1);
  saveWords();
  renderWords();
  showToast('🗑️ "' + name + '" dipadam.');
}

function exportData() {
  const blob = new Blob([JSON.stringify(words, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'kamus-kelantan-data.json';
  a.click();
  showToast('⬇ Data dieksport!');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!Array.isArray(imported)) throw new Error();
      const before = words.length;
      imported.forEach(item => {
        if (item.w && item.m && !words.find(x => x.w === item.w)) words.push(item);
      });
      saveWords();
      renderWords();
      showToast('✅ ' + (words.length - before) + ' perkataan baru diimport!');
    } catch(err) {
      showToast('❌ Fail JSON tidak sah.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

async function askAI() {
  const input = document.getElementById('ai-input');
  const word = input.value.trim();
  if (!word) return;
  const loading = document.getElementById('ai-loading');
  const result = document.getElementById('ai-result');
  loading.classList.add('show');
  result.classList.remove('show');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Kamu adalah pakar dialek Kelantan. Untuk perkataan atau frasa: "${word}"

Berikan maklumat dalam format ini (tulis dalam bahasa Melayu):
**Makna:** [makna dalam BM standard]
**Jawi:** [tulisan Jawi]
**Sebutan:** [cara sebut fonetik]
**Contoh Ayat:** [ayat Kelantan] → [terjemahan BM]
**Nota:** [fakta menarik atau konteks]

Kalau bukan dialek Kelantan, cadangkan perkataan Kelantan yang serupa.`
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(b => b.text||'').join('') || 'Maaf, tidak dapat menjawab sekarang.';
    result.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    result.classList.add('show');
  } catch(e) {
    result.innerHTML = '❌ Ralat sambungan. Sila cuba semula.';
    result.classList.add('show');
  }
  loading.classList.remove('show');
}

document.getElementById('ai-input').addEventListener('keydown', e => { if(e.key==='Enter') askAI(); });

function initWotd() {
  if (!words.length) return;
  const idx = new Date().getDate() % words.length;
  const w = words[idx];
  document.getElementById('wotd-word').textContent = w.w;
  document.getElementById('wotd-jawi').textContent = w.j || '';
  document.getElementById('wotd-meaning').textContent = '— ' + w.m;
}

loadWords();
initWotd();
renderWords();
</script>
